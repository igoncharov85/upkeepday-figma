<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAPI Mini Viewer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #2f3442;
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 18px;
        font-size: 12px;
      }

      form {
        display: grid;
        gap: 10px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        height: 34px;
        border: 1px solid #c8cbd2;
        border-radius: 6px;
        padding: 0 10px;
        color: #2f3442;
        background: #ffffff;
        font: inherit;
        font-weight: 500;
      }

      input:focus,
      select:focus {
        border-color: #18a058;
        outline: 2px solid rgba(24, 160, 88, 0.18);
      }

      .row {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 10px;
      }

      .url-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }

      .url-field {
        display: block;
      }

      .path-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }

      .icon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        min-width: 34px;
        padding: 0;
      }

      .icon-button img {
        width: 16px;
        height: 16px;
      }

      .button-with-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .button-with-icon img {
        width: 14px;
        height: 14px;
      }

      .search-panel {
        display: none;
        gap: 8px;
      }

      .search-panel.visible {
        display: grid;
      }

      .results {
        max-height: 156px;
        overflow: auto;
        border: 1px solid #d9dce2;
        border-radius: 6px;
        background: #ffffff;
      }

      .result {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        gap: 8px;
        width: 100%;
        height: auto;
        min-height: 40px;
        padding: 7px 8px;
        border: 0;
        border-bottom: 1px solid #edf0f3;
        border-radius: 0;
        color: #2f3442;
        background: #ffffff;
        text-align: left;
        font-weight: 500;
      }

      .result:hover,
      .result.selected {
        background: #eef9f3;
      }

      .result:last-child {
        border-bottom: 0;
      }

      .method-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px;
        min-height: 20px;
        border-radius: 4px;
        padding: 3px 6px;
        color: #ffffff;
        text-align: center;
        font-size: 10px;
        font-weight: 800;
      }

      .method-get {
        background: #62a6fa;
      }

      .method-post {
        background: #4ac987;
      }

      .method-put {
        background: #f5a83f;
      }

      .method-delete {
        background: #f26057;
      }

      .method-patch {
        background: #8b6af2;
      }

      .method-options {
        background: #5b7a90;
      }

      .method-head {
        background: #82715c;
      }

      .method-trace {
        background: #a85d7f;
      }

      .result-main {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #697080;
        font-size: 11px;
        font-weight: 500;
      }

      .result-meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #2f3442;
        font-size: 12px;
        font-weight: 700;
      }

      .response-panel {
        display: none;
        gap: 6px;
      }

      .response-panel.visible {
        display: grid;
      }

      .response-label {
        color: #2f3442;
        font-weight: 700;
      }

      .response-options {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .response-option {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 28px;
        border: 1px solid #d9dce2;
        border-radius: 6px;
        padding: 4px 8px;
        color: #2f3442;
        background: #ffffff;
        font-size: 11px;
        font-weight: 700;
      }

      .response-option input {
        width: 13px;
        height: 13px;
        margin: 0;
        padding: 0;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 4px;
      }

      button {
        height: 34px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        border-color: #c8cbd2;
        color: #2f3442;
        background: #ffffff;
      }

      button.primary {
        color: #ffffff;
        background: #2fc678;
      }

      button.refresh {
        border-color: #2fc678;
        color: #116b3c;
        background: #eaf8f0;
      }

      button:disabled {
        cursor: default;
        opacity: 0.62;
      }

      .message {
        display: none;
        min-height: 34px;
        border-radius: 6px;
        padding: 9px 10px;
        color: #596070;
        background: #f3f5f7;
      }

      .message.visible {
        display: block;
      }

      .message.error {
        color: #a32f28;
        background: #fff0ef;
      }

      .message.done {
        color: #596070;
        background: #f3f5f7;
      }
    </style>
  </head>
  <body>
    <form id="form">
      <div class="url-row">
        <input
          class="url-field"
          id="swaggerUrl"
          name="swaggerUrl"
          type="url"
          value="https://petstore3.swagger.io/api/v3/openapi.json"
          placeholder="Swagger/OpenAPI JSON URL"
          required
        />
        <button class="secondary" type="button" id="loadSpec">Load</button>
      </div>

      <div id="searchPanel" class="search-panel">
        <input id="search" name="search" type="search" placeholder="Search actions.." />
        <div id="results" class="results" aria-live="polite"></div>
      </div>

      <div class="row">
        <label>
          Method
          <select id="method" name="method">
            <option value="" selected></option>
            <option>POST</option>
            <option>GET</option>
            <option>PUT</option>
            <option>DELETE</option>
            <option>PATCH</option>
            <option>OPTIONS</option>
            <option>HEAD</option>
            <option>TRACE</option>
          </select>
        </label>

        <label>
          Path
          <div class="path-row">
            <input id="path" name="path" type="text" value="" placeholder="Select/enter action..." required />
            <button class="secondary icon-button" type="button" id="copyPath" title="Copy path" aria-label="Copy path"></button>
          </div>
        </label>
      </div>

      <div id="responsePanel" class="response-panel">
        <div class="response-label">Responses</div>
        <div id="responseOptions" class="response-options"></div>
      </div>

      <div class="actions">
        <button class="refresh" type="button" id="refresh" disabled>Refresh</button>
        <button class="secondary" type="button" id="cancel">Cancel</button>
        <button class="primary" type="submit" id="generate">Generate</button>
      </div>

      <div id="message" class="message"></div>
    </form>

    <script>
      const form = document.getElementById("form");
      const swaggerUrl = document.getElementById("swaggerUrl");
      const path = document.getElementById("path");
      const copyPath = document.getElementById("copyPath");
      const method = document.getElementById("method");
      const message = document.getElementById("message");
      const generate = document.getElementById("generate");
      const cancel = document.getElementById("cancel");
      const refresh = document.getElementById("refresh");
      const loadSpec = document.getElementById("loadSpec");
      const searchPanel = document.getElementById("searchPanel");
      const search = document.getElementById("search");
      const results = document.getElementById("results");
      const responsePanel = document.getElementById("responsePanel");
      const responseOptions = document.getElementById("responseOptions");
      let actions = [];
      let selectedActionKey = "";
      let responseCodes = [];
      let selectedResponseCodes = [];
      let isLoading = false;
      let generateBlockedUntilActionChange = false;
      let initialMethod = "";
      let initialPath = "";
      const copyIconUrl = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAAKpJREFUeAHtlMENgzAMRb+jDtBp2o7QdgB6LCOwATABc8AAMAMsFYhQIEJR5BBAQuKdcnDy7NgyweDxjVKAEpK4Y0HblKRjurrKwUTow/PzK0hSZnvcRMWMiXgKJCHmXvKRiPmSO/O1EoEAlOT1jv6umBs80c3mElQBhymbYYokVuIa4U0rsDV+8y9aSnbpgZLsKjC5BJfgBIJpm/puSS7HVWAjZMNqzt/kHhr9MCtdWWXdAAAAAElFTkSuQmCC";
      const refreshIconUrl = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAAg1JREFUeAG1VrFS20AQ3XfxBNLxCcofOBVMKsrEjZUigS7kC4i/wKcviP8gpMk4qeQGKJOGARr4A/QJrhjMwC27J52tkY3GHqw3o9HdSffe7u1qV6Aa7Mbx1u3960MwdmUaFZciyy8zAnN6fjrMwp7tj3us94uTP9A7FhHvfNiPHPiHPIxpGYCO4JCoUFXAVN/d7uwdOsNXSs6gMYAjJv4kXrzVTXo5vHrn1wi//CamAwZfCfn3ee2y5Z0vfWbYYpq+2Zh8+5emY6qBeissVgS/ltfnjkgtF0sGxbQnLwxoBYiQFS/6VYFWsMIRW10RD5LL0+FS5OG8FeJB+dHUax8DNtQH0xYkWEJu6QXQuMktCXOo9eLajZ9IIMsptw4YBnwqqvXrJvcCINfVgWMzogZgHKitgxaQUQMwGlwdnB3/vqYGAGoIIYUNNYD3nc/tYjhuROCBEeUjXDciAJhuPuLR2mNQ/XBb4YEWO4mKDVlVRihcy0DLjpYl/+GeDLPpET1HvpL1Uu6lWh74eiQNSNemHpTJxUV7efw3WYE7PwEmW3AloezM+kGp9OaKszZYR+z79mTjZ2ivRbm3M5qKgJxZ7xF5+Q5ChiUb0MrC174T70eYuLYUyq4TYn3Xt1exvNqo5gQ0oM+1wRqkkjG9Rd4uFAhrecohBnGX/S8LR8W2DPrbwvR/c/NuUNe3nwBjq/hvAdglOwAAAABJRU5ErkJggg==";
      const loadIconUrl = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAARJJREFUeAHtlK1uAkEUhc+lTWhd6yuoaFJRXVayjh+DgnXwCEgcWCRvAA4cDhxYMCBwCBA8wDoCgsu9wCYIYHcS1pD9kslM5uecmTt3BjAgmSmyFpM1MYRMZBAZRAZPb5DK5z8QloGVK5Q22/jUSjuJm3NkTD6/pZUulIwN9vuYLVWCiYfXTLRPx05zULmlQ7jDf8ZpEVh3tyImWwSXx0VM3544wLP3+M4e9XruVQPvfx/3u+RnchI8svIT93R9s2jS75QZ1L4QBwLs3CNQmqqJVE2JtatF20HElVcEREKoF1mBIeE/tPORcS/fTbnQcsnKOnVmriEcmi/rxXz09fP3KSf5lTx9wwPQqEhoGuNBt3oAmaNqrjPL0z4AAAAASUVORK5CYII=";
      const generateIconUrl = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAAa5JREFUeAGtVbFOAkEQnTkMHB3WqMFEaITECq88OyQWZyN06hcoXyB8gf6BlGh1NkondAYbGhMSC2hM7KQyQKLjLEbEc+92E+4ll7t7tzvvZmf2LUIArELZJqT7X4a6SMb+Q7MxAE2gakC+WHpDgsQcNYzHxust1x2CBgzlAMIbD5V4n5inoAmlAOfY+kcRndiOkwANKAVG0ZErobWzUAp0ea25UC0vr5uFeomm0bAtYbWyMLZ3S+d8Ub54cOY7CD5cqa5GFiiC/7xwz1c7t9c1CBGRlXR2me/WVA3QTmY24eX5qQ0hAbc4xegk1vdspoVACEMiqD/eXVUir73eaDWdizNvQ0jgrjP5spKZHE67iHv9QqhCyBBNEBEPIou1jeyYq12AcGH+MTvuqD7fUhAilG46Ey+WL4HoSPJpgIQ7fhauJcDnQor3SF8agPCYg9f95upZheHbYW5Q8O+pGiAiqY3w31cUU9UC1l7ZBknhibCmc3QqBegTDiX0oNNsVEEDgQLCRgjI8fK8NNqGGChgTkzH61GIUFcVdh5LgV+JZssjrIT/xjWjY2Vh5/EFhNKVr0KxZEAAAAAASUVORK5CYII=";
      const closeIconUrl = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAOdEVYdFNvZnR3YXJlAEZpZ21hnrGWYwAAAMxJREFUeAHFlcsNwjAMhu1MkjE4wo0RuHayXhmBWzkyRjYJNglSBUlr17VqqVJru9+fp42n6y1mzCNmHF6Pe4IdbM4MQC/kO5Nj4gAYrcKnyhwDkAp9JHqiVWQGj8zkGWAncNEuV4+BawkWOMdQmrgF/iegFZHk4tYfpQNpCqwBNLPsCvRA7Nfs06JAS6S6RXCRQEMEQHGMAzjbsUvkusmux9T1ormWCtdi51quXRvOHvAlkW/TN8PZPiMudyVB6fGl6SPg0wr/FanM4Q2232Ehuj7+RgAAAABJRU5ErkJggg==";

      copyPath.innerHTML = `<img src="${copyIconUrl}" alt="" />`;
      renderLoadButton(false);
      renderRefreshButton(false);
      renderGenerateButton(false);
      renderCancelButton();

      function renderLoadButton(isLoadingSpec) {
        const label = isLoadingSpec ? "Loading..." : "Load";
        loadSpec.innerHTML = `<span>${label}</span><img src="${loadIconUrl}" alt="" />`;
        loadSpec.classList.add("button-with-icon");
      }

      function renderRefreshButton(isRefreshing) {
        const label = isRefreshing ? "Refreshing..." : "Refresh";
        refresh.innerHTML = `<span>${label}</span><img src="${refreshIconUrl}" alt="" />`;
        refresh.classList.add("button-with-icon");
      }

      function renderGenerateButton(isGenerating) {
        const label = isGenerating ? "Generating..." : "Generate";
        generate.innerHTML = `<span>${label}</span><img src="${generateIconUrl}" alt="" />`;
        generate.classList.add("button-with-icon");
      }

      function renderCancelButton() {
        cancel.innerHTML = `<span>Close</span><img src="${closeIconUrl}" alt="" />`;
        cancel.classList.add("button-with-icon");
      }

      function setMessage(text, state) {
        message.textContent = text;
        message.className = text ? `message visible ${state || ""}` : "message";
      }

      function clearMessage() {
        setMessage("");
      }

      function setLoading(nextIsLoading) {
        isLoading = nextIsLoading;
        updateGenerateState();
        updateCopyState();
        cancel.disabled = nextIsLoading;
        loadSpec.disabled = nextIsLoading;
        refresh.disabled = nextIsLoading || refresh.dataset.canRefresh !== "true";
        renderGenerateButton(nextIsLoading);
        renderRefreshButton(nextIsLoading);
        renderLoadButton(nextIsLoading);
      }

      function validateUrl() {
        try {
          const url = new URL(swaggerUrl.value.trim());
          if (url.protocol !== "https:" && url.protocol !== "http:") {
            return "URL must start with http:// or https://.";
          }
        } catch {
          return "Enter a valid Swagger/OpenAPI JSON URL.";
        }

        return "";
      }

      function validatePath() {
        if (!path.value.trim().startsWith("/")) {
          return "Path must start with a slash.";
        }

        return "";
      }

      function validateMethod() {
        if (!method.value) {
          return "Select a method.";
        }

        return "";
      }

      function validateResponseCodes() {
        if (responseCodes.length > 1 && selectedResponseCodes.length === 0) {
          return "Select at least one response code.";
        }

        return "";
      }

      function selectedActionChanged() {
        return method.value !== initialMethod || path.value.trim() !== initialPath;
      }

      function updateGenerateState() {
        generate.disabled = isLoading || (generateBlockedUntilActionChange && !selectedActionChanged());
      }

      function updateCopyState() {
        copyPath.disabled = isLoading || !path.value.trim();
      }

      async function copyText(value) {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
          await navigator.clipboard.writeText(value);
          return;
        }

        const textarea = document.createElement("textarea");
        textarea.value = value;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        textarea.style.pointerEvents = "none";
        document.body.appendChild(textarea);
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);

        try {
          if (!document.execCommand("copy")) {
            throw new Error("Unable to copy path.");
          }
        } finally {
          document.body.removeChild(textarea);
        }
      }

      function renderResults() {
        const query = search.value.trim().toLowerCase();
        const matches = actions
          .filter((action) => !query || action.searchIndex.includes(query))
          .slice(0, 80);

        results.innerHTML = "";

        if (matches.length === 0) {
          const empty = document.createElement("div");
          empty.className = "result-meta";
          empty.style.padding = "10px";
          empty.textContent = actions.length === 0 ? "Load a spec to search actions." : "No matching actions.";
          results.appendChild(empty);
          return;
        }

        for (const action of matches) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `result ${selectedActionKey === actionKey(action) ? "selected" : ""}`;

          const methodBadge = document.createElement("span");
          methodBadge.className = `method-badge method-${action.method.toLowerCase()}`;
          methodBadge.textContent = action.method;

          const content = document.createElement("span");
          const main = document.createElement("div");
          main.className = "result-main";
          main.textContent = action.tag || "Untagged";

          const meta = document.createElement("div");
          meta.className = "result-meta";
          meta.textContent = action.path;

          content.appendChild(main);
          content.appendChild(meta);
          button.appendChild(methodBadge);
          button.appendChild(content);
          button.addEventListener("click", () => selectAction(action));
          results.appendChild(button);
        }
      }

      function selectAction(action) {
        selectedActionKey = actionKey(action);
        method.value = action.method;
        path.value = action.path;
        applyResponseCodes(action.responseCodes);
        clearMessage();
        renderResults();
        updateGenerateState();
        updateCopyState();
      }

      function actionKey(action) {
        return `${action.method} ${action.path}`;
      }

      function findCurrentAction() {
        const selectedMethod = method.value;
        const selectedPath = path.value.trim();
        return actions.find((action) => action.method === selectedMethod && action.path === selectedPath);
      }

      function updateSelectedActionFromFields() {
        const action = findCurrentAction();
        selectedActionKey = action ? actionKey(action) : "";
        applyResponseCodes(action ? action.responseCodes : [], selectedResponseCodes);
        renderResults();
        updateGenerateState();
        updateCopyState();
      }

      function applyResponseCodes(codes, preferredCodes) {
        responseCodes = Array.isArray(codes) ? codes.filter((code) => typeof code === "string" && code.trim()) : [];

        const preferred = Array.isArray(preferredCodes)
          ? preferredCodes.filter((code) => responseCodes.includes(code))
          : [];
        selectedResponseCodes = preferred.length > 0 ? preferred : defaultSelectedResponseCodes(responseCodes);
        renderResponseCodes();
      }

      function defaultSelectedResponseCodes(codes) {
        if (codes.length === 0) return [];
        if (codes.length === 1) return [codes[0]];
        return [codes.includes("200") ? "200" : codes[0]];
      }

      function renderResponseCodes() {
        responseOptions.innerHTML = "";

        if (responseCodes.length <= 1) {
          responsePanel.classList.remove("visible");
          return;
        }

        responsePanel.classList.add("visible");

        for (const code of responseCodes) {
          const label = document.createElement("label");
          label.className = "response-option";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.value = code;
          checkbox.checked = selectedResponseCodes.includes(code);
          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              selectedResponseCodes = [...new Set([...selectedResponseCodes, code])];
            } else {
              const nextCodes = selectedResponseCodes.filter((selectedCode) => selectedCode !== code);
              if (nextCodes.length === 0) {
                checkbox.checked = true;
                return;
              }
              selectedResponseCodes = nextCodes;
            }
            updateGenerateState();
          });

          label.appendChild(checkbox);
          label.appendChild(document.createTextNode(code));
          responseOptions.appendChild(label);
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        updateGenerateState();
        if (generate.disabled) return;

        const error = validateUrl() || validateMethod() || validatePath() || validateResponseCodes();

        if (error) {
          setMessage(error, "error");
          return;
        }

        setLoading(true);
        clearMessage();
        parent.postMessage({
          pluginMessage: {
            type: "generate",
            swaggerUrl: swaggerUrl.value.trim(),
            method: method.value,
            path: path.value.trim(),
            responseCodes: selectedResponseCodes
          }
        }, "*");
      });

      function loadCurrentSpec() {
        const error = validateUrl();

        if (error) {
          setMessage(error, "error");
          return false;
        }

        setLoading(true);
        clearMessage();
        parent.postMessage({
          pluginMessage: {
            type: "loadSpec",
            swaggerUrl: swaggerUrl.value.trim()
          }
        }, "*");
        return true;
      }

      loadSpec.addEventListener("click", () => {
        loadCurrentSpec();
      });

      search.addEventListener("input", renderResults);
      method.addEventListener("change", updateSelectedActionFromFields);
      path.addEventListener("input", updateSelectedActionFromFields);
      copyPath.addEventListener("click", async () => {
        const value = path.value.trim();
        if (!value) return;

        try {
          await copyText(value);
          setMessage("Path copied.", "done");
        } catch (error) {
          const detail = error instanceof Error ? error.message : "Unable to copy path.";
          setMessage(detail, "error");
        }

        updateCopyState();
      });

      cancel.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
      });

      refresh.addEventListener("click", () => {
        setLoading(true);
        clearMessage();
        parent.postMessage({ pluginMessage: { type: "refresh" } }, "*");
      });

      window.onmessage = (event) => {
        const pluginMessage = event.data.pluginMessage;
        if (!pluginMessage) return;

        setLoading(false);

        if (pluginMessage.type === "error") {
          setMessage(pluginMessage.message, "error");
          updateGenerateState();
          updateCopyState();
        }

        if (pluginMessage.type === "done") {
          initialMethod = method.value;
          initialPath = path.value.trim();
          generateBlockedUntilActionChange = true;
          clearMessage();
          updateGenerateState();
          updateCopyState();
        }

        if (pluginMessage.type === "actions") {
          actions = pluginMessage.actions || [];
          const currentAction = findCurrentAction();
          selectedActionKey = currentAction ? actionKey(currentAction) : "";
          searchPanel.classList.add("visible");
          search.value = "";
          search.placeholder = `Search ${actions.length} actions...`;
          applyResponseCodes(currentAction ? currentAction.responseCodes : [], selectedResponseCodes);
          renderResults();
          clearMessage();
          updateGenerateState();
          updateCopyState();
        }

        if (pluginMessage.type === "selection") {
          refresh.dataset.canRefresh = pluginMessage.canRefresh ? "true" : "false";
          refresh.disabled = !pluginMessage.canRefresh;

          if (pluginMessage.config) {
            swaggerUrl.value = pluginMessage.config.swaggerUrl;
            method.value = pluginMessage.config.method;
            path.value = pluginMessage.config.path;
            initialMethod = pluginMessage.canRefresh ? pluginMessage.config.method : "";
            initialPath = pluginMessage.canRefresh ? pluginMessage.config.path : "";
            generateBlockedUntilActionChange = Boolean(pluginMessage.canRefresh);
            selectedResponseCodes = pluginMessage.config.responseCodes || [];
            applyResponseCodes([], selectedResponseCodes);
            clearMessage();
            updateGenerateState();
            updateCopyState();
          }

          if (pluginMessage.autoLoadSpec) {
            loadCurrentSpec();
          }
        }

        if (pluginMessage.type === "variables") {
          if (pluginMessage.config.swaggerUrl) {
            swaggerUrl.value = pluginMessage.config.swaggerUrl;
          }

          if (pluginMessage.config.method) {
            method.value = pluginMessage.config.method;
          }

          if (pluginMessage.config.path) {
            path.value = pluginMessage.config.path;
          }

          clearMessage();
          updateGenerateState();
          updateCopyState();
        }
      };

      updateCopyState();
    </script>
  </body>
</html>
